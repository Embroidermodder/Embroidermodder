# Commands
# --------
# When there are no arguments or shortcut arguments it is because
# they're implicitly empty strings. When there is no flags argument it's
# interpreted as 0.
#
# Shortcuts should match: https://doc.qt.io/qt-6/qkeysequence.html#standard-shortcuts
# Apple platforms may need an additional argument like .apple_shortcut

[null-command]
type = "command"
id = 0
command = "null"
arguments = "NULL"
icon = "NULL"
tooltip = "NULL"
statustip = "NULL"
alias = "NULL"
shortcut = "NULL"
flags = 0

