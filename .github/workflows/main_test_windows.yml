name: Test (Windows, main)

on:
  push:
    branches:
      - main

jobs:
  build:
    name: "Test on Windows"
    runs-on: windows-latest
    steps:
      - name: Get repository
        run: git clone https://github.com/embroidermodder/embroidermodder
      - name: Build
        run: cd embroidermodder; ./test.sh windows-latest
      - uses: actions/upload-artifact@v4
        with:
          name: embroidermodder-windows
          path: ./embroidermodder

